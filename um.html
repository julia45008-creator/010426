<!DOCTYPE html>
<html>
<head>
    <title>Atividade JS</title>
</head>
<body id="body" style="text-align: center;">


    <h1 id="texto">Bom Dia </h1>
    <button onclick="mudarTexto()">Mudar Texto</button>

    <br><br>
    <button onclick="mudarCor('#b287e8', '#1c023b')">Roxo</button>
    <button onclick="mudarCor('black', 'white')">Preto</button>
    <button onclick="mudarCor('#fff5c7', '#3b2502')">Off white</button>
    <button onclick="mudarCor('#8cd3ff', '#0b3854')">Azul bb</button>    
    <br><br>

    <button onclick="boasVindas()">Boas-vindas</button>
    <script>
        function mudarTexto() {
            document.getElementById("texto").innerHTML = "Boa Tarde";
        }

        function mudarCor(cor, cortexto) {
            document.getElementById("body").style.backgroundColor = cor;
            document.getElementById("texto").style.color = cortexto;
        }

        function boasVindas() {
            alert("Bem-vindo(a) ao site! ;3");
        }
    </script>

</body>
</html>
